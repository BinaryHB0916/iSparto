<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 280" width="1280" height="280">
  <defs>
    <radialGradient id="clear-zone" cx="50%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#000000" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="titleBlur"><feGaussianBlur stdDeviation="15"/></filter>
  </defs>

  <!-- Pure black background -->
  <rect width="1280" height="280" fill="#000000"/>

  <!-- Left 3 columns of matrix rain -->
  <g font-family="monospace" font-size="15" fill="rgba(180,255,180,0.5)">
    <text x="20" y="18">θ</text><text x="20" y="52">Λ</text><text x="20" y="86">σ</text><text x="20" y="120">Π</text><text x="20" y="154">ω</text><text x="20" y="188">α</text><text x="20" y="222">Ξ</text><text x="20" y="256">ρ</text>
    <text x="56" y="35">φ</text><text x="56" y="69">Β</text><text x="56" y="103">κ</text><text x="56" y="137">ψ</text><text x="56" y="171">Γ</text><text x="56" y="205">η</text><text x="56" y="239">τ</text><text x="56" y="273">Ω</text>
    <text x="92" y="8">Σ</text><text x="92" y="42">ν</text><text x="92" y="76">Φ</text><text x="92" y="110">ι</text><text x="92" y="144">β</text><text x="92" y="178">Ε</text><text x="92" y="212">χ</text><text x="92" y="246">δ</text><text x="92" y="280">μ</text>
  </g>
  <!-- Left fading tops -->
  <g font-family="monospace" font-size="15" fill="rgba(180,255,180,0.15)">
    <text x="20" y="18">θ</text><text x="92" y="8">Σ</text>
  </g>
  <!-- Left bright tails -->
  <g font-family="monospace" font-size="15" fill="rgba(180,255,180,0.9)">
    <text x="20" y="256">ρ</text><text x="56" y="273">Ω</text><text x="92" y="280">μ</text>
  </g>
  <!-- Left occasional gold -->
  <g font-family="monospace" font-size="15" fill="rgba(212,175,55,0.6)">
    <text x="56" y="137">Σ</text><text x="92" y="212">π</text>
  </g>

  <!-- Right 3 columns of matrix rain (mirrored: 1188, 1224, 1260) -->
  <g font-family="monospace" font-size="15" fill="rgba(180,255,180,0.5)">
    <text x="1188" y="28">Η</text><text x="1188" y="62">τ</text><text x="1188" y="96">Λ</text><text x="1188" y="130">ρ</text><text x="1188" y="164">χ</text><text x="1188" y="198">Α</text><text x="1188" y="232">ι</text><text x="1188" y="266">β</text>
    <text x="1224" y="42">φ</text><text x="1224" y="76">Ω</text><text x="1224" y="110">σ</text><text x="1224" y="144">γ</text><text x="1224" y="178">λ</text><text x="1224" y="212">Θ</text><text x="1224" y="246">ξ</text><text x="1224" y="280">Κ</text>
    <text x="1260" y="8">υ</text><text x="1260" y="42">ζ</text><text x="1260" y="76">Ψ</text><text x="1260" y="110">η</text><text x="1260" y="144">Ρ</text><text x="1260" y="178">ο</text><text x="1260" y="212">Δ</text><text x="1260" y="246">Σ</text>
  </g>
  <!-- Right fading tops -->
  <g font-family="monospace" font-size="15" fill="rgba(180,255,180,0.15)">
    <text x="1260" y="8">υ</text><text x="1188" y="28">Η</text>
  </g>
  <!-- Right bright tails -->
  <g font-family="monospace" font-size="15" fill="rgba(180,255,180,0.9)">
    <text x="1188" y="266">β</text><text x="1224" y="280">Κ</text><text x="1260" y="246">Σ</text>
  </g>
  <!-- Right occasional gold -->
  <g font-family="monospace" font-size="15" fill="rgba(212,175,55,0.6)">
    <text x="1224" y="178">ρ</text><text x="1260" y="110">τ</text>
  </g>

  <!-- Center clear zone overlay -->
  <rect width="1280" height="280" fill="url(#clear-zone)"/>

  <!-- Green glow behind title -->
  <text x="640" y="140" text-anchor="middle" fill="rgba(0,255,65,0.08)" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="900" letter-spacing="0.12em" filter="url(#titleBlur)">iSparto</text>

  <!-- Title: iSparto -->
  <text x="640" y="140" text-anchor="middle" fill="rgba(255,255,255,0.85)" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="900" letter-spacing="0.12em">iSparto</text>

  <!-- Subtitle -->
  <text x="640" y="178" text-anchor="middle" fill="rgba(212,175,55,0.55)" font-family="Georgia, 'Times New Roman', serif" font-size="16" letter-spacing="0.3em">Σπαρτοί · The Sown Ones</text>
</svg>