<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" width="1100" height="700">
  <defs>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(212,175,55,0)"/>
      <stop offset="50%" stop-color="rgba(212,175,55,0.35)"/>
      <stop offset="100%" stop-color="rgba(212,175,55,0)"/>
    </linearGradient>
    <linearGradient id="card-lead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141008"/>
      <stop offset="100%" stop-color="#0d0b07"/>
    </linearGradient>
    <linearGradient id="card-exec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a0f"/>
      <stop offset="100%" stop-color="#080f0a"/>
    </linearGradient>
    <filter id="glow-gold"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="glow-green"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="700" fill="#000"/>

  <!-- Side matrix rain — left 2 columns -->
  <g font-family="monospace" font-size="14" fill="rgba(180,255,180,0.3)">
    <text x="18" y="22">θ</text><text x="18" y="56">Λ</text><text x="18" y="90">σ</text><text x="18" y="124">Π</text><text x="18" y="158">ω</text><text x="18" y="192">α</text><text x="18" y="226">Ξ</text><text x="18" y="260">ρ</text><text x="18" y="294">δ</text><text x="18" y="328">Ω</text><text x="18" y="362">μ</text><text x="18" y="396">Λ</text><text x="18" y="430">η</text><text x="18" y="464">Φ</text><text x="18" y="498">β</text><text x="18" y="532">γ</text><text x="18" y="566">ζ</text><text x="18" y="600">Ψ</text><text x="18" y="634">κ</text>
    <text x="48" y="38">ψ</text><text x="48" y="72">Β</text><text x="48" y="106">ν</text><text x="48" y="140">φ</text><text x="48" y="174">Γ</text><text x="48" y="208">ε</text><text x="48" y="242">τ</text><text x="48" y="276">Η</text><text x="48" y="310">ι</text><text x="48" y="344">χ</text><text x="48" y="378">Α</text><text x="48" y="412">λ</text><text x="48" y="446">Θ</text><text x="48" y="480">ξ</text><text x="48" y="514">Κ</text><text x="48" y="548">υ</text><text x="48" y="582">Σ</text><text x="48" y="616">π</text>
  </g>
  <g font-family="monospace" font-size="14" fill="rgba(180,255,180,0.85)">
    <text x="18" y="634">κ</text><text x="48" y="616">π</text>
  </g>
  <g font-family="monospace" font-size="14" fill="rgba(212,175,55,0.5)">
    <text x="18" y="260">ρ</text><text x="48" y="446">Θ</text>
  </g>

  <!-- Side matrix rain — right 2 columns (mirrored) -->
  <g font-family="monospace" font-size="14" fill="rgba(180,255,180,0.3)">
    <text x="1052" y="30">Σ</text><text x="1052" y="64">π</text><text x="1052" y="98">α</text><text x="1052" y="132">ρ</text><text x="1052" y="166">τ</text><text x="1052" y="200">ο</text><text x="1052" y="234">ί</text><text x="1052" y="268">Δ</text><text x="1052" y="302">Ω</text><text x="1052" y="336">θ</text><text x="1052" y="370">Λ</text><text x="1052" y="404">φ</text><text x="1052" y="438">Γ</text><text x="1052" y="472">ψ</text><text x="1052" y="506">β</text><text x="1052" y="540">η</text><text x="1052" y="574">κ</text><text x="1052" y="608">ζ</text>
    <text x="1082" y="14">ε</text><text x="1082" y="48">Ψ</text><text x="1082" y="82">μ</text><text x="1082" y="116">Π</text><text x="1082" y="150">ω</text><text x="1082" y="184">χ</text><text x="1082" y="218">ν</text><text x="1082" y="252">Φ</text><text x="1082" y="286">δ</text><text x="1082" y="320">Σ</text><text x="1082" y="354">α</text><text x="1082" y="388">ι</text><text x="1082" y="422">Η</text><text x="1082" y="456">τ</text><text x="1082" y="490">Ξ</text><text x="1082" y="524">Ρ</text><text x="1082" y="558">ο</text><text x="1082" y="592">λ</text><text x="1082" y="626">Β</text>
  </g>
  <g font-family="monospace" font-size="14" fill="rgba(180,255,180,0.85)">
    <text x="1052" y="608">ζ</text><text x="1082" y="626">Β</text>
  </g>
  <g font-family="monospace" font-size="14" fill="rgba(212,175,55,0.5)">
    <text x="1052" y="200">ο</text><text x="1082" y="388">ι</text>
  </g>

  <!-- ═══════════════ CENTER CONTENT (shifted +50 for balanced margins) ═══════════════ -->
  <g transform="translate(50,0)">

    <!-- ═══════════════ USER ═══════════════ -->
    <text x="500" y="72" text-anchor="middle" fill="rgba(212,175,55,0.12)" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="900" letter-spacing="0.15em" filter="url(#glow-gold)">USER</text>
    <text x="500" y="72" text-anchor="middle" fill="rgba(212,175,55,0.9)" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="900" letter-spacing="0.15em">USER</text>
    <text x="500" y="100" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15" letter-spacing="0.06em">Product direction · Requirements · Wave acceptance</text>

    <rect x="300" y="125" width="400" height="1" fill="url(#gold-line)"/>
    <line x1="500" y1="126" x2="500" y2="175" stroke="rgba(212,175,55,0.3)" stroke-width="1"/>

    <!-- ═══════════════ TEAM LEAD CARD ═══════════════ -->
    <rect x="70" y="175" width="600" height="220" rx="10" fill="url(#card-lead)" stroke="rgba(212,175,55,0.18)" stroke-width="1"/>

    <text x="370" y="225" text-anchor="middle" fill="rgba(255,255,255,0.92)" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="900" letter-spacing="0.1em">TEAM LEAD</text>
    <text x="370" y="251" text-anchor="middle" fill="rgba(212,175,55,0.6)" font-family="'Courier New', monospace" font-size="13" letter-spacing="0.08em">MAIN SESSION</text>

    <g fill="rgba(212,175,55,0.5)">
      <circle cx="155" cy="291" r="2.5"/>
      <circle cx="155" cy="314" r="2.5"/>
      <circle cx="155" cy="337" r="2.5"/>
      <circle cx="155" cy="360" r="2.5"/>
    </g>
    <g fill="rgba(255,255,255,0.6)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="15">
      <text x="167" y="295">Assemble prompts</text>
      <text x="167" y="318">Review Developer output</text>
      <text x="167" y="341">Coordinate workflow</text>
      <text x="167" y="364">Merge code</text>
    </g>

    <!-- Doc Engineer sub-card -->
    <rect x="370" y="278" width="280" height="100" rx="8" fill="rgba(20,16,8,0.6)" stroke="rgba(212,175,55,0.25)" stroke-width="1"/>
    <text x="510" y="312" text-anchor="middle" fill="rgba(212,175,55,0.85)" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="bold" letter-spacing="0.05em">Doc Engineer</text>
    <text x="510" y="332" text-anchor="middle" fill="rgba(212,175,55,0.5)" font-family="'Courier New', monospace" font-size="11">SUB-AGENT</text>
    <text x="510" y="359" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">Wave completion · Doc audit &amp; sync</text>

    <!-- ═══════════════ INDEPENDENT REVIEWER CARD ═══════════════ -->
    <rect x="700" y="175" width="270" height="220" rx="10" fill="url(#card-lead)" stroke="rgba(212,175,55,0.18)" stroke-width="1" stroke-dasharray="8,4"/>

    <text x="835" y="240" text-anchor="middle" fill="rgba(212,175,55,0.12)" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="900" letter-spacing="0.08em" filter="url(#glow-gold)">INDEPENDENT</text>
    <text x="835" y="240" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="900" letter-spacing="0.08em">INDEPENDENT</text>
    <text x="835" y="268" text-anchor="middle" fill="rgba(212,175,55,0.12)" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="900" letter-spacing="0.08em" filter="url(#glow-gold)">REVIEWER</text>
    <text x="835" y="268" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="900" letter-spacing="0.08em">REVIEWER</text>
    <text x="835" y="294" text-anchor="middle" fill="rgba(212,175,55,0.6)" font-family="'Courier New', monospace" font-size="12" letter-spacing="0.08em">TEAMMATE · ZERO CONTEXT</text>
    <text x="835" y="340" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14">Peer review on major changes</text>

    <!-- ═══════════════ CONNECTION LINES ═══════════════ -->
    <line x1="670" y1="285" x2="700" y2="285" stroke="rgba(212,175,55,0.3)" stroke-width="1" stroke-dasharray="6,4"/>
    <rect x="100" y="395" width="540" height="1" fill="url(#gold-line)"/>
    <line x1="210" y1="395" x2="210" y2="500" stroke="rgba(180,255,180,0.3)" stroke-width="1"/>
    <line x1="510" y1="395" x2="510" y2="500" stroke="rgba(180,255,180,0.3)" stroke-width="1"/>

    <!-- ═══════════════ TEAMMATE CARD ═══════════════ -->
    <rect x="70" y="500" width="280" height="140" rx="10" fill="url(#card-exec)" stroke="rgba(180,255,180,0.15)" stroke-width="1"/>

    <text x="210" y="528" text-anchor="middle" fill="rgba(0,255,65,0.06)" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="900" letter-spacing="0.1em" filter="url(#glow-green)">TEAMMATE</text>
    <text x="210" y="528" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="900" letter-spacing="0.1em">TEAMMATE</text>
    <text x="210" y="554" text-anchor="middle" fill="rgba(180,255,180,0.55)" font-family="'Courier New', monospace" font-size="12" letter-spacing="0.08em">TMUX SESSION</text>
    <g fill="rgba(255,255,255,0.55)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">
      <text x="210" y="585">Parallel prompt assembly</text>
      <text x="210" y="603">Review Developer output</text>
    </g>

    <!-- ═══════════════ DEVELOPER CARD ═══════════════ -->
    <rect x="370" y="500" width="280" height="140" rx="10" fill="url(#card-exec)" stroke="rgba(180,255,180,0.15)" stroke-width="1"/>

    <text x="510" y="528" text-anchor="middle" fill="rgba(0,255,65,0.06)" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="900" letter-spacing="0.1em" filter="url(#glow-green)">DEVELOPER</text>
    <text x="510" y="528" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="900" letter-spacing="0.1em">DEVELOPER</text>
    <text x="510" y="554" text-anchor="middle" fill="rgba(180,255,180,0.55)" font-family="'Courier New', monospace" font-size="12" letter-spacing="0.08em">CODEX · MCP CALL</text>
    <g fill="rgba(255,255,255,0.55)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" text-anchor="middle">
      <text x="510" y="585">Implement code · Fix issues</text>
      <text x="510" y="603">QA smoke testing</text>
    </g>

  </g>
</svg>
