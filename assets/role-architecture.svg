<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" width="1000" height="640">
  <defs>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(212,175,55,0)"/>
      <stop offset="50%" stop-color="rgba(212,175,55,0.35)"/>
      <stop offset="100%" stop-color="rgba(212,175,55,0)"/>
    </linearGradient>
    <linearGradient id="gold-line-v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(212,175,55,0.4)"/>
      <stop offset="100%" stop-color="rgba(180,255,180,0.25)"/>
    </linearGradient>
    <linearGradient id="card-lead" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141008"/>
      <stop offset="100%" stop-color="#0d0b07"/>
    </linearGradient>
    <linearGradient id="card-exec" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c1a0f"/>
      <stop offset="100%" stop-color="#080f0a"/>
    </linearGradient>
    <filter id="glow-gold"><feGaussianBlur stdDeviation="12"/></filter>
    <filter id="glow-green"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="640" fill="#000"/>

  <!-- Side matrix rain — left 2 columns -->
  <g font-family="monospace" font-size="14" fill="rgba(180,255,180,0.3)">
    <text x="15" y="22">θ</text><text x="15" y="56">Λ</text><text x="15" y="90">σ</text><text x="15" y="124">Π</text><text x="15" y="158">ω</text><text x="15" y="192">α</text><text x="15" y="226">Ξ</text><text x="15" y="260">ρ</text><text x="15" y="294">δ</text><text x="15" y="328">Ω</text><text x="15" y="362">μ</text><text x="15" y="396">Λ</text><text x="15" y="430">η</text><text x="15" y="464">Φ</text><text x="15" y="498">β</text><text x="15" y="532">γ</text><text x="15" y="566">ζ</text><text x="15" y="600">Ψ</text><text x="15" y="634">κ</text>
    <text x="45" y="38">ψ</text><text x="45" y="72">Β</text><text x="45" y="106">ν</text><text x="45" y="140">φ</text><text x="45" y="174">Γ</text><text x="45" y="208">ε</text><text x="45" y="242">τ</text><text x="45" y="276">Η</text><text x="45" y="310">ι</text><text x="45" y="344">χ</text><text x="45" y="378">Α</text><text x="45" y="412">λ</text><text x="45" y="446">Θ</text><text x="45" y="480">ξ</text><text x="45" y="514">Κ</text><text x="45" y="548">υ</text><text x="45" y="582">Σ</text><text x="45" y="616">π</text>
  </g>
  <g font-family="monospace" font-size="14" fill="rgba(180,255,180,0.85)">
    <text x="15" y="634">κ</text><text x="45" y="616">π</text>
  </g>
  <g font-family="monospace" font-size="14" fill="rgba(212,175,55,0.5)">
    <text x="15" y="260">ρ</text><text x="45" y="446">Θ</text>
  </g>

  <!-- Side matrix rain — right 2 columns -->
  <g font-family="monospace" font-size="14" fill="rgba(180,255,180,0.3)">
    <text x="955" y="30">Σ</text><text x="955" y="64">π</text><text x="955" y="98">α</text><text x="955" y="132">ρ</text><text x="955" y="166">τ</text><text x="955" y="200">ο</text><text x="955" y="234">ί</text><text x="955" y="268">Δ</text><text x="955" y="302">Ω</text><text x="955" y="336">θ</text><text x="955" y="370">Λ</text><text x="955" y="404">φ</text><text x="955" y="438">Γ</text><text x="955" y="472">ψ</text><text x="955" y="506">β</text><text x="955" y="540">η</text><text x="955" y="574">κ</text><text x="955" y="608">ζ</text>
    <text x="985" y="14">ε</text><text x="985" y="48">Ψ</text><text x="985" y="82">μ</text><text x="985" y="116">Π</text><text x="985" y="150">ω</text><text x="985" y="184">χ</text><text x="985" y="218">ν</text><text x="985" y="252">Φ</text><text x="985" y="286">δ</text><text x="985" y="320">Σ</text><text x="985" y="354">α</text><text x="985" y="388">ι</text><text x="985" y="422">Η</text><text x="985" y="456">τ</text><text x="985" y="490">Ξ</text><text x="985" y="524">Ρ</text><text x="985" y="558">ο</text><text x="985" y="592">λ</text><text x="985" y="626">Β</text>
  </g>
  <g font-family="monospace" font-size="14" fill="rgba(180,255,180,0.85)">
    <text x="955" y="608">ζ</text><text x="985" y="626">Β</text>
  </g>
  <g font-family="monospace" font-size="14" fill="rgba(212,175,55,0.5)">
    <text x="955" y="200">ο</text><text x="985" y="388">ι</text>
  </g>

  <!-- ═══════════════ USER ═══════════════ -->
  <!-- Gold glow behind title -->
  <text x="500" y="72" text-anchor="middle" fill="rgba(212,175,55,0.12)" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="900" letter-spacing="0.15em" filter="url(#glow-gold)">USER</text>
  <!-- Title -->
  <text x="500" y="72" text-anchor="middle" fill="rgba(212,175,55,0.9)" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="900" letter-spacing="0.15em">USER</text>
  <!-- Subtitle -->
  <text x="500" y="100" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13" letter-spacing="0.06em">Product direction · Requirements · Wave acceptance</text>

  <!-- Divider -->
  <rect x="300" y="125" width="400" height="1" fill="url(#gold-line)"/>

  <!-- Connection: User → Lead -->
  <line x1="500" y1="126" x2="500" y2="175" stroke="rgba(212,175,55,0.3)" stroke-width="1"/>

  <!-- ═══════════════ TEAM LEAD CARD ═══════════════ -->
  <rect x="160" y="175" width="680" height="190" rx="10" fill="url(#card-lead)" stroke="rgba(212,175,55,0.18)" stroke-width="1"/>

  <!-- Lead title -->
  <text x="500" y="218" text-anchor="middle" fill="rgba(255,255,255,0.92)" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="900" letter-spacing="0.1em">TEAM LEAD</text>
  <text x="500" y="244" text-anchor="middle" fill="rgba(212,175,55,0.6)" font-family="'Courier New', monospace" font-size="11" letter-spacing="0.08em">CLAUDE OPUS 4.6 · MAIN SESSION</text>

  <!-- Lead description — two columns inside card -->
  <g fill="rgba(255,255,255,0.6)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">
    <!-- Left column: Lead duties -->
    <text x="220" y="285">Break down tasks</text>
    <text x="220" y="305">Interface contracts</text>
    <text x="220" y="325">Coordinate workflow</text>
    <text x="220" y="345">Merge code</text>
  </g>

  <!-- Vertical separator -->
  <line x1="500" y1="270" x2="500" y2="355" stroke="rgba(212,175,55,0.1)" stroke-width="0.5"/>

  <!-- Right column: Doc Engineer -->
  <text x="560" y="285" fill="rgba(212,175,55,0.75)" font-family="Georgia, 'Times New Roman', serif" font-size="16" font-weight="bold" letter-spacing="0.05em">Doc Engineer</text>
  <text x="700" y="285" fill="rgba(255,255,255,0.3)" font-family="'Courier New', monospace" font-size="10">sub-agent</text>
  <g fill="rgba(255,255,255,0.5)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">
    <text x="560" y="310">After each Wave completion</text>
    <text x="560" y="330">Documentation audit &amp; sync</text>
  </g>

  <!-- ═══════════════ CONNECTION LINES ═══════════════ -->
  <!-- Horizontal divider at Lead card bottom edge -->
  <rect x="200" y="365" width="600" height="1" fill="url(#gold-line)"/>

  <!-- Lead → Developer (vertical drop from card bottom) -->
  <line x1="270" y1="365" x2="270" y2="430" stroke="rgba(180,255,180,0.3)" stroke-width="1"/>

  <!-- Lead → Codex (vertical drop from card bottom) -->
  <line x1="730" y1="365" x2="730" y2="430" stroke="rgba(180,255,180,0.3)" stroke-width="1"/>

  <!-- ═══════════════ DEVELOPER CARD ═══════════════ -->
  <rect x="100" y="430" width="340" height="140" rx="10" fill="url(#card-exec)" stroke="rgba(180,255,180,0.15)" stroke-width="1"/>

  <!-- Green glow -->
  <text x="270" y="478" text-anchor="middle" fill="rgba(0,255,65,0.06)" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="900" letter-spacing="0.1em" filter="url(#glow-green)">DEVELOPER</text>
  <!-- Title -->
  <text x="270" y="478" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="900" letter-spacing="0.1em">DEVELOPER</text>
  <text x="270" y="502" text-anchor="middle" fill="rgba(180,255,180,0.55)" font-family="'Courier New', monospace" font-size="10" letter-spacing="0.08em">CLAUDE OPUS 4.6 · TEAMMATE</text>

  <g fill="rgba(255,255,255,0.55)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">
    <text x="270" y="535">Write code · Unit tests · Review Codex fixes</text>
  </g>

  <!-- ═══════════════ CODEX REVIEWER CARD ═══════════════ -->
  <rect x="560" y="430" width="340" height="140" rx="10" fill="url(#card-exec)" stroke="rgba(180,255,180,0.15)" stroke-width="1"/>

  <!-- Green glow -->
  <text x="730" y="478" text-anchor="middle" fill="rgba(0,255,65,0.06)" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="900" letter-spacing="0.1em" filter="url(#glow-green)">CODEX REVIEWER</text>
  <!-- Title -->
  <text x="730" y="478" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="900" letter-spacing="0.1em">CODEX REVIEWER</text>
  <text x="730" y="502" text-anchor="middle" fill="rgba(180,255,180,0.55)" font-family="'Courier New', monospace" font-size="10" letter-spacing="0.08em">CODEX 5.3 · MCP CALL</text>

  <g fill="rgba(255,255,255,0.55)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle">
    <text x="730" y="535">Code review · Direct fixes · QA smoke testing</text>
  </g>


</svg>